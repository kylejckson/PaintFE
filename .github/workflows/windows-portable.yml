name: Windows Portable Build

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows-portable:
    name: Build Windows portable zip
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.1

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-portable-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-portable-cargo-

      - name: Build PaintFE
        run: cargo build --release

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          global-json-file: global.json

      - name: Publish Paint.NET compatibility host
        run: |
          dotnet restore paintdotnet-host/src/PaintFE.PaintDotNetHost/PaintFE.PaintDotNetHost.csproj --locked-mode
          dotnet publish paintdotnet-host/src/PaintFE.PaintDotNetHost/PaintFE.PaintDotNetHost.csproj -c Release -r win-x64 --self-contained true --no-restore -m:1 -o target/release/paintdotnet-host
          (Get-FileHash target/release/paintdotnet-host/PaintFE.PaintDotNetHost.exe -Algorithm SHA256).Hash.ToLowerInvariant() | Set-Content -NoNewline target/release/paintdotnet-host/PaintFE.PaintDotNetHost.exe.sha256

      - name: Stage portable folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist\PaintFE-windows-x64 | Out-Null
          Copy-Item target\release\PaintFE.exe dist\PaintFE-windows-x64\
          Copy-Item -Recurse -Force target\release\paintdotnet-host dist\PaintFE-windows-x64\paintdotnet-host

      - name: Upload portable artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: PaintFE-windows-x64
          path: dist/PaintFE-windows-x64
