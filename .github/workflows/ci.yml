name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  clippy:
    name: Clippy
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.1
          components: clippy

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ci-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ci-clippy-

      - name: Run Clippy
        run: cargo clippy -- -D warnings

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
        with:
          global-json-file: global.json

      - name: Restore Paint.NET compatibility host
        run: dotnet restore paintdotnet-host/src/PaintFE.PaintDotNetHost/PaintFE.PaintDotNetHost.csproj --locked-mode

      - name: Build Paint.NET compatibility host
        run: dotnet build paintdotnet-host/src/PaintFE.PaintDotNetHost/PaintFE.PaintDotNetHost.csproj -c Release --no-restore -m:1

      - name: Test compatibility host and fixture plugin
        shell: pwsh
        run: |
          dotnet restore paintdotnet-host/tests/LegacyFixture/LegacyFixture.csproj --locked-mode
          dotnet build paintdotnet-host/tests/LegacyFixture/LegacyFixture.csproj -c Release --no-restore
          dotnet run --project paintdotnet-host/src/PaintFE.PaintDotNetHost/PaintFE.PaintDotNetHost.csproj -c Release -- --self-test paintdotnet-host/tests/LegacyFixture/bin/Release/net8.0/LegacyFixture.dll

      - name: Test PDN import fixture
        run: |
          dotnet restore paintdotnet-host/src/PaintFE.PaintDotNetHost/PaintFE.PaintDotNetHost.csproj --locked-mode
          dotnet publish paintdotnet-host/src/PaintFE.PaintDotNetHost/PaintFE.PaintDotNetHost.csproj -c Release -r win-x64 --self-contained true --no-restore -m:1 -o target/pdn-host/win-x64
          (Get-FileHash target/pdn-host/win-x64/PaintFE.PaintDotNetHost.exe -Algorithm SHA256).Hash.ToLowerInvariant() | Set-Content -NoNewline target/pdn-host/win-x64/PaintFE.PaintDotNetHost.exe.sha256
          cargo test pdn --lib

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.1

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  build-macos:
    name: Build check (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.1
          components: clippy

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ci-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ci-macos-

      - name: Run Clippy
        run: cargo clippy -- -D warnings
